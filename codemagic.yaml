workflows:
  ios-release:
    name: Prize Clube iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "Codemagic"
    environment:
      groups:
        - ios-release
      vars:
        XCODE_WORKSPACE: "pwa/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.marinaprizeclub.app"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Node dependencies
        script: |
          cd pwa
          npm ci --legacy-peer-deps
      - name: Prepare Capacitor web assets
        script: |
          cd pwa
          mkdir -p out
          echo '<html><head><meta http-equiv="refresh" content="0;url=https://app.marinaprizeclub.com/login"></head></html>' > out/index.html
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd pwa/ios/App
          pod install
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@env:CM_CERTIFICATE_PRIVATE_KEY
          keychain add-certificates
          xcode-project use-profiles
      - name: Enable Push Notification capability
        script: |
          cd pwa/ios/App
          # Ensure the provisioning profile includes push notifications
          # The entitlements file (App/App.entitlements) with aps-environment=production
          # is already referenced in the Xcode project build settings
      - name: Increment build number
        script: |
          cd pwa/ios/App
          # Read the current project version as a baseline floor
          CURRENT_VERSION=$(agvtool vers -terse 2>/dev/null | grep -oE '[0-9]+' | head -1 || echo "1")
          echo "Current project version: $CURRENT_VERSION"
          # Try to get latest TestFlight build number from App Store Connect
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null | grep -oE '[0-9]+' | tail -1 || true)
          echo "API returned: '$LATEST_BUILD'"
          # Fallback to CM_BUILD_NUMBER if API fails
          if [ -z "$LATEST_BUILD" ] || ! [[ "$LATEST_BUILD" =~ ^[0-9]+$ ]] || [ "$LATEST_BUILD" -lt 1 ]; then
            LATEST_BUILD="${CM_BUILD_NUMBER:-10}"
            echo "API lookup failed, using CM_BUILD_NUMBER fallback: LATEST_BUILD=$LATEST_BUILD"
          fi
          # Use whichever is higher: API result or current project version
          if [ "$CURRENT_VERSION" -gt "$LATEST_BUILD" ]; then
            LATEST_BUILD="$CURRENT_VERSION"
            echo "Using project version as floor: $LATEST_BUILD"
          fi
          NEW_BUILD=$((LATEST_BUILD + 1))
          echo "Setting build number: $NEW_BUILD"
          agvtool new-version -all "$NEW_BUILD"
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

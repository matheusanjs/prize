workflows:
  ios-release:
    name: Prize Clube iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "Codemagic"
    environment:
      groups:
        - ios-release
      vars:
        XCODE_WORKSPACE: "pwa/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.marinaprizeclub.app"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Node dependencies
        script: |
          cd pwa
          npm ci --legacy-peer-deps
      - name: Prepare Capacitor web assets
        script: |
          cd pwa
          mkdir -p out
          cat > out/index.html << 'FALLBACK'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
          <title>Prize Clube</title>
          <style>body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0D1B2A;color:#fff;font-family:system-ui}
          .box{text-align:center;padding:24px}
          .spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.2);border-top:4px solid #007577;border-radius:50%;animation:s 1s linear infinite;margin:0 auto 16px}
          @keyframes s{to{transform:rotate(360deg)}}</style>
          </head>
          <body>
          <div class="box">
            <div class="spinner"></div>
            <p>Carregando Prize Clube...</p>
            <p id="info" style="font-size:12px;opacity:.5;margin-top:20px"></p>
          </div>
          <script>
          var el=document.getElementById('info');
          setTimeout(function(){
            el.textContent='Redirecionando...';
            window.location.href='https://app.marinaprizeclub.com/login';
          },2000);
          setTimeout(function(){
            el.textContent='Fallback: server.url may not be working. Tap to open.';
            el.onclick=function(){window.location.href='https://app.marinaprizeclub.com/login'};
            el.style.textDecoration='underline';
            el.style.cursor='pointer';
          },8000);
          </script>
          </body></html>
          FALLBACK
          npx cap sync ios
      - name: Add CustomViewController to Xcode project
        script: |
          cd pwa/ios/App
          gem install xcodeproj
          ruby <<'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          target = project.targets.first

          # Check if already added
          already = target.source_build_phase.files.any? { |f| f.display_name == 'CustomViewController.swift' }
          if already
            puts "CustomViewController.swift already in build phase — skipping"
          else
            # Find or create the App group
            app_group = project.main_group.children.find { |g| g.display_name == 'App' }
            if app_group.nil?
              puts "ERROR: Could not find App group"
              exit 1
            end

            # Add file reference
            file_ref = app_group.new_file('CustomViewController.swift')
            target.source_build_phase.add_file_reference(file_ref)
            project.save
            puts "Added CustomViewController.swift to Xcode project build phase"
          end
          RUBY
      - name: Debug — verify Capacitor config
        script: |
          echo "=== capacitor.config.json (native) ==="
          cat pwa/ios/App/App/capacitor.config.json
          echo ""
          echo "=== Main.storyboard ==="
          cat pwa/ios/App/App/Base.lproj/Main.storyboard
          echo ""
          echo "=== out/index.html ==="
          cat pwa/out/index.html
          echo ""
          echo "=== pbxproj CustomViewController references ==="
          grep -c "CustomViewController" App.xcodeproj/project.pbxproj || echo "NOT FOUND in pbxproj"
      - name: Install CocoaPods
        script: |
          cd pwa/ios/App
          pod install
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@env:CM_CERTIFICATE_PRIVATE_KEY
          keychain add-certificates
          xcode-project use-profiles
      - name: Enable Push Notification capability
        script: |
          cd pwa/ios/App
          # Ensure the provisioning profile includes push notifications
          # The entitlements file (App/App.entitlements) with aps-environment=production
          # is already referenced in the Xcode project build settings
      - name: Increment build number
        script: |
          cd pwa/ios/App
          # Use minutes since 2026-01-01 as build number — always increasing, never duplicates.
          EPOCH_2026=$(date -d '2026-01-01T00:00:00Z' +%s 2>/dev/null || date -j -f '%Y-%m-%dT%H:%M:%SZ' '2026-01-01T00:00:00Z' +%s)
          NOW=$(date +%s)
          NEW_BUILD=$(( (NOW - EPOCH_2026) / 60 ))
          echo "Timestamp-based CFBundleVersion=$NEW_BUILD"
          agvtool new-version -all "$NEW_BUILD"
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

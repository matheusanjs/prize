workflows:
  ios-release:
    name: Prize Clube iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "Codemagic"
    environment:
      groups:
        - ios-release
      vars:
        XCODE_WORKSPACE: "pwa/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.marinaprizeclub.app"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Node dependencies
        script: |
          cd pwa
          npm ci --legacy-peer-deps
      - name: Prepare Capacitor web assets
        script: |
          cd pwa
          mkdir -p out
          echo '<html><head><meta http-equiv="refresh" content="0;url=https://app.marinaprizeclub.com/login"></head></html>' > out/index.html
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd pwa/ios/App
          pod install
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@env:CM_CERTIFICATE_PRIVATE_KEY
          keychain add-certificates
          xcode-project use-profiles
      - name: Enable Push Notification capability
        script: |
          cd pwa/ios/App
          # Ensure the provisioning profile includes push notifications
          # The entitlements file (App/App.entitlements) with aps-environment=production
          # is already referenced in the Xcode project build settings
      - name: Increment build number
        script: |
          cd pwa/ios/App
          # BASE_OFFSET must always be higher than the last known App Store build (currently 21).
          # Each Codemagic run has a unique CM_BUILD_NUMBER (1, 2, 3...) so BASE_OFFSET + CM_BUILD_NUMBER
          # is always unique and strictly increasing — no API delay issues.
          BASE_OFFSET=30
          CM_NUM="${CM_BUILD_NUMBER:-1}"
          NEW_BUILD=$((BASE_OFFSET + CM_NUM))
          echo "CM_BUILD_NUMBER=$CM_NUM  BASE_OFFSET=$BASE_OFFSET  →  CFBundleVersion=$NEW_BUILD"
          agvtool new-version -all "$NEW_BUILD"
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

workflows:
  ios-release:
    name: Prize Clube iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "Codemagic"
    environment:
      vars:
        XCODE_WORKSPACE: "pwa/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.marinaprizeclub.app"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Node dependencies
        script: |
          cd pwa
          npm ci --legacy-peer-deps
      - name: Prepare Capacitor web assets
        script: |
          cd pwa
          mkdir -p out
          echo '<html><head><meta http-equiv="refresh" content="0;url=https://app.marinaprizeclub.com/login"></head></html>' > out/index.html
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd pwa/ios/App
          pod install
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles --project pwa/ios/App/App.xcodeproj

          # Extract profile info and persist for build step
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PATH=$(ls "$PROFILES_DIR"/*.mobileprovision 2>/dev/null | head -1)
          DECODED=$(security cms -D -i "$PROFILE_PATH")
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$DECODED")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< "$DECODED")
          PP_TEAM=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /dev/stdin <<< "$DECODED")
          echo "CM_PROFILE_UUID=$PP_UUID" >> $CM_ENV
          echo "CM_PROFILE_NAME=$PP_NAME" >> $CM_ENV
          echo "CM_TEAM_ID=$PP_TEAM" >> $CM_ENV
          echo "✅ Profile: $PP_NAME | UUID: $PP_UUID | Team: $PP_TEAM"

          # Force Manual signing in pbxproj (cap sync may have reset it)
          sed -i '' 's/ProvisioningStyle = Automatic/ProvisioningStyle = Manual/g' pwa/ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' pwa/ios/App/App.xcodeproj/project.pbxproj
      - name: Increment build number
        script: |
          cd pwa/ios/App
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $((LATEST_BUILD + 1))
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM=$CM_TEAM_ID PROVISIONING_PROFILE_SPECIFIER=$CM_PROFILE_NAME CODE_SIGN_IDENTITY=Apple Distribution"
    artifacts:
      - pwa/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

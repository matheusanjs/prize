workflows:
  ios-release:
    name: Prize Clube iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "Codemagic"
    environment:
      groups:
        - ios-release
      vars:
        XCODE_WORKSPACE: "pwa/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.marinaprizeclub.app"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Node dependencies
        script: |
          cd pwa
          npm ci --legacy-peer-deps
      - name: Prepare Capacitor web assets
        script: |
          cd pwa
          mkdir -p out
          echo '<html><head><meta http-equiv="refresh" content="0;url=https://app.marinaprizeclub.com/login"></head></html>' > out/index.html
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd pwa/ios/App
          pod install
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@env:CM_CERTIFICATE_PRIVATE_KEY
          keychain add-certificates
          xcode-project use-profiles
      - name: Enable Push Notification capability
        script: |
          cd pwa/ios/App
          # Ensure the provisioning profile includes push notifications
          # The entitlements file (App/App.entitlements) with aps-environment=production
          # is already referenced in the Xcode project build settings
      - name: Increment build number
        script: |
          cd pwa/ios/App
          # Use minutes since 2026-01-01 as build number — always increasing, never duplicates.
          EPOCH_2026=$(date -d '2026-01-01T00:00:00Z' +%s 2>/dev/null || date -j -f '%Y-%m-%dT%H:%M:%SZ' '2026-01-01T00:00:00Z' +%s)
          NOW=$(date +%s)
          NEW_BUILD=$(( (NOW - EPOCH_2026) / 60 ))
          echo "Timestamp-based CFBundleVersion=$NEW_BUILD"
          agvtool new-version -all "$NEW_BUILD"
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

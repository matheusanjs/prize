version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: prize-clube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: prize_clube
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 2g

  redis:
    image: redis:7-alpine
    container_name: prize-clube-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-prize-redis-local} --maxmemory 512mb --maxmemory-policy noeviction
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-prize-redis-local}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 768m

volumes:
  pgdata:
  redisdata:
